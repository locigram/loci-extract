name: vlm-fast
description: Fast VLM hybrid using Qwen3-VL 8B (parser + verify + VLM fallback)
ocr_strategy: vlm_hybrid
ocr_backend: auto
classifier:
  strategy: vlm
  confidence_threshold: 0.60
enable_llm_enrichment: false
mask_pii: false
vlm:
  base_url: http://localhost:11434
  model: qwen3-vl:8b
  timeout: 60

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: [self-hosted, Linux, X64, suru-devops, loci-extract, docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: [self-hosted, Linux, X64, suru-devops, loci-extract, docker]
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t loci-extract:ci .

      - name: Smoke test container
        run: |
          set -euo pipefail
          docker rm -f loci-extract-ci >/dev/null 2>&1 || true
          docker run -d --name loci-extract-ci -p 18000:8000 loci-extract:ci
          cleanup() {
            docker rm -f loci-extract-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          for _ in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:18000/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo 'Container did not become healthy in time.' >&2
          docker logs loci-extract-ci || true
          exit 1
